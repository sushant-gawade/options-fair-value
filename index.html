
<style>
  .fvc { padding: 1rem 0; font-family: var(--font-mono); }
  .fvc-inputs { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  @media(max-width:500px){ .fvc-inputs { grid-template-columns: 1fr 1fr; } }
  .fvc-icard { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .fvc-icard label { display: block; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 6px; letter-spacing: 0.5px; }
  .fvc-icard input { width: 100%; background: transparent; border: none; outline: none; font-family: var(--font-mono); font-size: 1.15rem; font-weight: 500; color: var(--color-text-primary); -moz-appearance: textfield; }
  .fvc-icard input::-webkit-inner-spin-button, .fvc-icard input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .fvc-icard.ce { border-color: #D85A30; }
  .fvc-icard.pe { border-color: #378ADD; }
  .fvc-icard.ce label { color: #D85A30; }
  .fvc-icard.pe label { color: #378ADD; }
  .fvc-cards { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  @media(max-width:440px){ .fvc-cards { grid-template-columns: 1fr; } }
  .fvc-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; text-align: center; }
  .fvc-card .lbl { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 8px; letter-spacing: 0.5px; }
  .fvc-card .val { font-size: 1.9rem; font-weight: 500; line-height: 1; margin-bottom: 2px; }
  .fvc-card .sub { font-size: 11px; color: var(--color-text-tertiary); }
  .fvc-card.ce .val { color: #D85A30; }
  .fvc-card.pe .val { color: #378ADD; }
  .fvc-card.tot .val { color: #1D9E75; }
  .fvc-sec { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 2px; text-transform: uppercase; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
  .fvc-sec::after { content:''; flex:1; height:0.5px; background: var(--color-border-tertiary); }
  .tbl-wrap { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; overflow-x: auto; margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 13px; background: var(--color-background-primary); }
  thead tr { background: var(--color-background-secondary); }
  th { padding: 9px 12px; text-align: center; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-tertiary); font-weight: 400; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 8px 12px; text-align: center; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); font-weight: 500; }
  td:first-child { text-align: left; font-size: 12px; color: var(--color-text-secondary); font-weight: 400; }
  tr:last-child td { border-bottom: none; }
  .row-today td { background: rgba(29,158,117,0.07); }
  .row-today td:first-child { color: #1D9E75 !important; font-weight: 500; }
  .row-expiry td:first-child { color: #E24B4A !important; }
  .ce-v { color: #D85A30; }
  .pe-v { color: #378ADD; }
  .tot-v { color: #1D9E75; }
  .fac-v { color: var(--color-text-tertiary); font-size: 12px; font-weight: 400; }
  .bdg { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 5px; font-weight: 500; letter-spacing: 0.5px; vertical-align: middle; }
  .bdg-t { background: rgba(29,158,117,0.15); color: #0F6E56; }
  .bdg-e { background: rgba(226,75,74,0.15); color: #A32D2D; }
  .empty { text-align: center; padding: 24px; color: var(--color-text-tertiary); font-size: 13px; }
</style>

<div class="fvc">
  <div class="fvc-sec">Inputs</div>
  <div class="fvc-inputs">
    <div class="fvc-icard ce">
      <label>ATM CE Premium</label>
      <input type="number" id="ce" placeholder="120" oninput="calc()">
    </div>
    <div class="fvc-icard pe">
      <label>ATM PE Premium</label>
      <input type="number" id="pe" placeholder="100" oninput="calc()">
    </div>
    <div class="fvc-icard">
      <label>Total Days (Expiry)</label>
      <input type="number" id="totalDays" placeholder="7" oninput="calc()">
    </div>
    <div class="fvc-icard">
      <label>Days Left Today</label>
      <input type="number" id="daysLeft" placeholder="2" oninput="calc()">
    </div>
  </div>

  <div class="fvc-sec">Today's Opening Fair Value</div>
  <div class="fvc-cards">
    <div class="fvc-card ce">
      <div class="lbl">CE Fair Value</div>
      <div class="val" id="todayCE">—</div>
      <div class="sub">Call Option</div>
    </div>
    <div class="fvc-card pe">
      <div class="lbl">PE Fair Value</div>
      <div class="val" id="todayPE">—</div>
      <div class="sub">Put Option</div>
    </div>
    <div class="fvc-card tot">
      <div class="lbl">PE + CE Combined</div>
      <div class="val" id="todayTotal">—</div>
      <div class="sub">Total Premium</div>
    </div>
  </div>

  <div class="fvc-sec">Day-wise Fair Value Table</div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Day</th>
          <th>Days Left</th>
          <th>√ Factor</th>
          <th style="color:#D85A30">CE Fair Value</th>
          <th style="color:#378ADD">PE Fair Value</th>
          <th style="color:#1D9E75">PE + CE</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="empty">Enter all inputs to see the table</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function calc() {
  const ce    = parseFloat(document.getElementById('ce').value);
  const pe    = parseFloat(document.getElementById('pe').value);
  const total = parseInt(document.getElementById('totalDays').value);
  const today = parseInt(document.getElementById('daysLeft').value);

  if (!ce || !pe || !total || !today || total < 1 || today < 1 || today > total) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="6" class="empty">Enter valid inputs to see the table</td></tr>`;
    ['todayCE','todayPE','todayTotal'].forEach(id =>
      document.getElementById(id).textContent = '—');
    return;
  }

  const factor   = Math.sqrt(today / total);
  const ceFair   = ce * factor;
  const peFair   = pe * factor;
  const combined = ceFair + peFair;

  document.getElementById('todayCE').textContent    = ceFair.toFixed(1);
  document.getElementById('todayPE').textContent    = peFair.toFixed(1);
  document.getElementById('todayTotal').textContent = combined.toFixed(1);

  let rows = '';
  for (let dLeft = total; dLeft >= 1; dLeft--) {
    const f    = Math.sqrt(dLeft / total);
    const ceV  = (ce * f).toFixed(1);
    const peV  = (pe * f).toFixed(1);
    const totV = (ce * f + pe * f).toFixed(1);
    const dayNum = total - dLeft + 1;
    const isToday  = (dLeft === today);
    const isExpiry = (dLeft === 1);
    let dayLabel = `Day ${dayNum}`;
    if (isToday)  dayLabel += ` <span class="bdg bdg-t">TODAY</span>`;
    if (isExpiry) dayLabel += ` <span class="bdg bdg-e">EXPIRY</span>`;
    rows += `<tr class="${isToday ? 'row-today' : isExpiry ? 'row-expiry' : ''}">
      <td>${dayLabel}</td>
      <td>${dLeft}</td>
      <td class="fac-v">${f.toFixed(4)}</td>
      <td class="ce-v">${ceV}</td>
      <td class="pe-v">${peV}</td>
      <td class="tot-v">${totV}</td>
    </tr>`;
  }
  document.getElementById('tableBody').innerHTML = rows;
}

window.onload = () => {
  document.getElementById('ce').value        = 120;
  document.getElementById('pe').value        = 100;
  document.getElementById('totalDays').value = 7;
  document.getElementById('daysLeft').value  = 2;
  calc();
};
</script>
